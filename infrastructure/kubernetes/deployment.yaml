apiVersion: apps/v1
kind: Deployment
metadata:
  name: sparkaph-gameserver
  namespace: sparkaph
  labels:
    app: sparkaph
    component: gameserver
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sparkaph
      component: gameserver
  template:
    metadata:
      labels:
        app: sparkaph
        component: gameserver
    spec:
      containers:
      - name: gameserver
        image: stexiel/sparkaph:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: SERVER_PORT
          value: "8080"
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: sparkaph-secrets
              key: postgres-host
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: sparkaph-secrets
              key: postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sparkaph-secrets
              key: postgres-password
        - name: POSTGRES_DB
          value: "sparkaph"
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: sparkaph-secrets
              key: redis-host
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sparkaph-secrets
              key: redis-password
        - name: LOG_LEVEL
          value: "info"
        - name: TICK_RATE
          value: "60"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: sparkaph-gameserver
  namespace: sparkaph
  labels:
    app: sparkaph
    component: gameserver
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: sparkaph
    component: gameserver
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sparkaph-gameserver-hpa
  namespace: sparkaph
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sparkaph-gameserver
  minReplicas: 3
  maxReplicas: 100
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 5
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      selectPolicy: Min
