version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sparkaph-postgres
    environment:
      POSTGRES_USER: sparkaph
      POSTGRES_PASSWORD: sparkaph_dev
      POSTGRES_DB: sparkaph
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparkaph"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sparkaph-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  gameserver:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sparkaph-gameserver
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: sparkaph
      DB_PASSWORD: sparkaph_dev
      DB_NAME: sparkaph
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
